<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Systematic X-Ray Read framework diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F8FA"/>
      <stop offset="100%" stop-color="#EEF4F9"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#003B5C"/>
    </marker>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <text x="400" y="60" font-family="'Source Serif 4', serif" font-size="30" font-weight="700" fill="#003B5C" text-anchor="middle">Systematic X-Ray Read</text>
  <text x="400" y="92" font-family="Inter, sans-serif" font-size="14" fill="#475569" text-anchor="middle">Confirm → Alignment → Bone → Cartilage → Soft Tissues → Impression</text>
  <g font-family="Inter, sans-serif" font-size="15" fill="#0F172A">
    <g>
      <rect x="60" y="140" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#A8C2D7"/>
      <text x="160" y="172" text-anchor="middle" font-weight="700" fill="#003B5C">1 · Confirm</text>
      <text x="160" y="196" text-anchor="middle" font-size="12" fill="#475569">Patient · Side · Date · Views · Adequacy</text>
    </g>
    <g>
      <rect x="300" y="140" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#A8C2D7"/>
      <text x="400" y="172" text-anchor="middle" font-weight="700" fill="#003B5C">2 · Alignment</text>
      <text x="400" y="196" text-anchor="middle" font-size="12" fill="#475569">Joint congruity · Dislocation · Axes</text>
    </g>
    <g>
      <rect x="540" y="140" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#A8C2D7"/>
      <text x="640" y="172" text-anchor="middle" font-weight="700" fill="#003B5C">3 · Bone</text>
      <text x="640" y="196" text-anchor="middle" font-size="12" fill="#475569">Cortex · Trabeculae · Avulsions · Stress</text>
    </g>
    <g>
      <rect x="60" y="280" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#A8C2D7"/>
      <text x="160" y="312" text-anchor="middle" font-weight="700" fill="#003B5C">4 · Cartilage</text>
      <text x="160" y="336" text-anchor="middle" font-size="12" fill="#475569">Joint space · Osteophytes · Sclerosis</text>
    </g>
    <g>
      <rect x="300" y="280" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#A8C2D7"/>
      <text x="400" y="312" text-anchor="middle" font-weight="700" fill="#003B5C">5 · Soft Tissues</text>
      <text x="400" y="336" text-anchor="middle" font-size="12" fill="#475569">Swelling · Fat pads · Calcifications</text>
    </g>
    <g>
      <rect x="540" y="280" width="200" height="80" rx="14" fill="#FFFFFF" stroke="#003B5C" stroke-width="1.5"/>
      <text x="640" y="312" text-anchor="middle" font-weight="700" fill="#003B5C">6 · Impression</text>
      <text x="640" y="336" text-anchor="middle" font-size="12" fill="#475569">Dx · Negatives · Correlation · Next step</text>
    </g>
  </g>
  <g stroke="#003B5C" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M260 180 L300 180"/>
    <path d="M500 180 L540 180"/>
    <path d="M640 220 Q640 250 160 250 Q160 270 160 280"/>
    <path d="M260 320 L300 320"/>
    <path d="M500 320 L540 320"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" fill="#475569">
    <rect x="120" y="430" width="560" height="120" rx="16" fill="#FFFFFF" stroke="#FFD24F"/>
    <text x="400" y="464" text-anchor="middle" font-weight="700" fill="#7A6400" font-size="13" letter-spacing="2">CLINICAL PEARL</text>
    <text x="400" y="494" text-anchor="middle" font-family="'Source Serif 4', serif" font-size="18" fill="#003B5C">A repeatable habit beats memorizing fracture patterns.</text>
    <text x="400" y="520" text-anchor="middle" font-size="13" fill="#475569">Make the framework automatic — interpretation gets faster and more reliable.</text>
  </g>
</svg>
