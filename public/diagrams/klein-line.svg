<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Klein line normal vs SCFE diagram">
  <rect width="800" height="600" fill="#F7F8FA"/>
  <text x="400" y="50" font-family="'Source Serif 4', serif" font-size="26" font-weight="700" fill="#003B5C" text-anchor="middle">Klein Line — Normal vs SCFE</text>
  <text x="400" y="80" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-anchor="middle">A line along the superior femoral neck on AP should intersect the lateral epiphysis</text>
  <g transform="translate(80,120)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#003B5C">Normal</text>
    <!-- Femoral shaft -->
    <path d="M170 220 L200 220 L210 360 L160 360 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Femoral neck -->
    <path d="M195 220 L120 160 Q105 150 120 140 L195 200 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Femoral head/epiphysis -->
    <circle cx="100" cy="135" r="40" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Klein line crossing epiphysis -->
    <line x1="220" y1="225" x2="60" y2="118" stroke="#FFD100" stroke-width="3"/>
    <text x="240" y="225" font-size="11" font-weight="700" fill="#7A6400">Klein line</text>
    <text x="240" y="240" font-size="10" fill="#7A6400">intersects epiphysis</text>
  </g>
  <g transform="translate(440,120)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#9F1239">SCFE</text>
    <!-- Femoral shaft -->
    <path d="M170 220 L200 220 L210 360 L160 360 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Neck -->
    <path d="M195 220 L120 160 Q105 150 120 140 L195 200 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Slipped epiphysis lower than normal -->
    <circle cx="105" cy="155" r="40" stroke="#9F1239" stroke-width="3" fill="#FFFFFF"/>
    <!-- Klein line missing epiphysis -->
    <line x1="220" y1="225" x2="60" y2="118" stroke="#FFD100" stroke-width="3"/>
    <text x="240" y="225" font-size="11" font-weight="700" fill="#9F1239">Klein line</text>
    <text x="240" y="240" font-size="10" fill="#9F1239">does NOT intersect</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" fill="#475569">
    <rect x="80" y="470" width="640" height="100" rx="16" fill="#FFFFFF" stroke="#FECACA"/>
    <text x="400" y="500" text-anchor="middle" font-weight="700" fill="#9F1239" font-size="13" letter-spacing="2">DO NOT MISS</text>
    <text x="400" y="528" text-anchor="middle" font-family="'Source Serif 4', serif" font-size="17" fill="#0F172A">Adolescent knee/hip pain + abnormal Klein line = emergent ortho referral, NWB.</text>
    <text x="400" y="552" text-anchor="middle" font-size="12" fill="#64748B">Original UCLA Sports Medicine illustrative diagram — not a real radiograph</text>
  </g>
</svg>
