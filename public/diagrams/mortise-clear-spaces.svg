<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Ankle mortise clear spaces diagram">
  <rect width="800" height="600" fill="#F7F8FA"/>
  <text x="400" y="50" font-family="'Source Serif 4', serif" font-size="26" font-weight="700" fill="#003B5C" text-anchor="middle">Ankle Mortise — Clear Spaces</text>
  <text x="400" y="80" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Medial clear space should ≈ superior clear space (~ 2–4 mm)</text>
  <g transform="translate(80,120)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#003B5C">Normal mortise</text>
    <!-- Tibia -->
    <path d="M120 30 L120 220 L80 240 L80 280 L240 280 L240 240 L200 220 L200 30 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Talar dome -->
    <path d="M80 290 Q160 330 240 290 L240 360 L80 360 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Medial malleolus -->
    <path d="M80 240 L60 280 L80 280 Z" fill="#0F172A"/>
    <!-- Lateral malleolus -->
    <path d="M240 240 L260 280 L240 280 Z" fill="#0F172A"/>
    <!-- Clear-space arrows -->
    <line x1="80" y1="295" x2="80" y2="278" stroke="#FFD100" stroke-width="2"/>
    <line x1="120" y1="282" x2="120" y2="270" stroke="#FFD100" stroke-width="2"/>
    <text x="60" y="300" font-size="11" fill="#7A6400" font-weight="700">M ≈ 3 mm</text>
    <text x="100" y="266" font-size="11" fill="#7A6400" font-weight="700">S ≈ 3 mm</text>
  </g>
  <g transform="translate(440,120)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#9F1239">Deltoid / syndesmotic injury</text>
    <!-- Tibia -->
    <path d="M120 30 L120 220 L80 240 L80 280 L240 280 L240 240 L200 220 L200 30 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Talar dome shifted laterally -->
    <path d="M105 295 Q180 335 250 295 L250 365 L105 365 Z" stroke="#0F172A" stroke-width="3" fill="#FFFFFF"/>
    <!-- Mediolateral malleoli -->
    <path d="M80 240 L60 280 L80 280 Z" fill="#0F172A"/>
    <path d="M240 240 L260 280 L240 280 Z" fill="#0F172A"/>
    <!-- Wider medial clear space arrow -->
    <line x1="80" y1="295" x2="80" y2="278" stroke="#9F1239" stroke-width="2"/>
    <text x="40" y="300" font-size="11" fill="#9F1239" font-weight="700">M ≈ 6 mm</text>
    <line x1="160" y1="284" x2="160" y2="272" stroke="#FFD100" stroke-width="2"/>
    <text x="140" y="266" font-size="11" fill="#7A6400" font-weight="700">S ≈ 3 mm</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" fill="#475569">
    <rect x="80" y="460" width="640" height="100" rx="16" fill="#FFFFFF" stroke="#A8C2D7"/>
    <text x="400" y="492" text-anchor="middle" font-weight="700" fill="#003B5C" font-size="13" letter-spacing="2">PEARL</text>
    <text x="400" y="520" text-anchor="middle" font-family="'Source Serif 4', serif" font-size="17" fill="#0F172A">M &gt; S asymmetry → think deltoid disruption ± syndesmotic injury.</text>
    <text x="400" y="544" text-anchor="middle" font-size="12" fill="#64748B">Original UCLA Sports Medicine illustrative diagram — not a real radiograph</text>
  </g>
</svg>
