<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="CRITOE pediatric elbow ossification order diagram">
  <rect width="800" height="600" fill="#F7F8FA"/>
  <text x="400" y="46" font-family="'Source Serif 4', serif" font-size="26" font-weight="700" fill="#003B5C" text-anchor="middle">CRITOE — Elbow Ossification Order</text>
  <text x="400" y="76" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Order of appearance of pediatric elbow ossification centers (approx. ages in years)</text>

  <g transform="translate(150,110)" font-family="Inter, sans-serif">
    <!-- simple elbow outline -->
    <path d="M120 0 L150 0 L165 180 L135 180 Z" stroke="#94A3B8" stroke-width="2" fill="#FFFFFF"/>
    <path d="M70 200 L100 188 L150 360 L120 372 Z" stroke="#94A3B8" stroke-width="2" fill="#FFFFFF" opacity="0.7"/>
    <path d="M200 220 L218 220 L230 360 L212 360 Z" stroke="#94A3B8" stroke-width="2" fill="#FFFFFF" opacity="0.7"/>

    <!-- ossification centers as gold dots, labeled -->
    <g>
      <circle cx="142" cy="195" r="13" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="142" y="200" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">C</text>
    </g>
    <g>
      <circle cx="95" cy="180" r="12" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="95" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">R</text>
    </g>
    <g>
      <circle cx="185" cy="172" r="12" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="185" y="177" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">I</text>
    </g>
    <g>
      <circle cx="205" cy="205" r="12" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="205" y="210" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">T</text>
    </g>
    <g>
      <circle cx="120" cy="215" r="12" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="120" y="220" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">O</text>
    </g>
    <g>
      <circle cx="190" cy="150" r="12" fill="#FFD100" stroke="#7A6400" stroke-width="1.5"/>
      <text x="190" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#003B5C">E</text>
    </g>
  </g>

  <g transform="translate(430,120)" font-family="Inter, sans-serif" font-size="14">
    <g><rect x="0" y="0" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="22" font-weight="700" fill="#003B5C">C</text><text x="40" y="22" fill="#0F172A">Capitellum — ~1 yr</text></g>
    <g><rect x="0" y="42" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="64" font-weight="700" fill="#003B5C">R</text><text x="40" y="64" fill="#0F172A">Radial head — ~3 yr</text></g>
    <g><rect x="0" y="84" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="106" font-weight="700" fill="#003B5C">I</text><text x="40" y="106" fill="#0F172A">Internal (medial) epicondyle — ~5 yr</text></g>
    <g><rect x="0" y="126" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="148" font-weight="700" fill="#003B5C">T</text><text x="40" y="148" fill="#0F172A">Trochlea — ~7 yr</text></g>
    <g><rect x="0" y="168" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="190" font-weight="700" fill="#003B5C">O</text><text x="40" y="190" fill="#0F172A">Olecranon — ~9 yr</text></g>
    <g><rect x="0" y="210" width="250" height="34" rx="8" fill="#FFFFFF" stroke="#A8C2D7"/><text x="14" y="232" font-weight="700" fill="#003B5C">E</text><text x="40" y="232" fill="#0F172A">External (lateral) epicondyle — ~11 yr</text></g>
  </g>

  <g font-family="Inter, sans-serif">
    <rect x="70" y="500" width="660" height="80" rx="16" fill="#FFFFFF" stroke="#FECACA"/>
    <text x="400" y="528" text-anchor="middle" font-weight="700" fill="#9F1239" font-size="12" letter-spacing="2">DO NOT MISS</text>
    <text x="400" y="552" text-anchor="middle" font-family="'Source Serif 4', serif" font-size="16" fill="#003B5C">If the trochlea (T) appears before the medial epicondyle (I), the "epicondyle" may be an entrapped avulsion.</text>
    <text x="400" y="572" text-anchor="middle" font-size="11" fill="#64748B">Ages approximate. Original UCLA Sports Medicine illustrative diagram — not a real radiograph</text>
  </g>
</svg>
