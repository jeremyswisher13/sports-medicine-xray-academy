<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Gilula arcs diagram">
  <rect width="800" height="600" fill="#F7F8FA"/>
  <text x="400" y="50" font-family="'Source Serif 4', serif" font-size="26" font-weight="700" fill="#003B5C" text-anchor="middle">Gilula Arcs — Carpal Alignment</text>
  <text x="400" y="80" font-family="Inter, sans-serif" font-size="13" fill="#475569" text-anchor="middle">Three smooth arcs connect the proximal/distal carpal rows on PA wrist</text>
  <g transform="translate(80,130)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#003B5C">Normal</text>
    <!-- Distal radius/ulna -->
    <path d="M40 360 L40 300 L120 280 L200 300 L200 360 Z" stroke="#0F172A" stroke-width="2.5" fill="#FFFFFF"/>
    <path d="M210 350 L260 350 L260 280 L210 290" stroke="#0F172A" stroke-width="2.5" fill="#FFFFFF"/>
    <!-- Proximal carpal row (scaphoid, lunate, triquetrum) -->
    <ellipse cx="80" cy="240" rx="32" ry="22" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="140" cy="220" rx="28" ry="22" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="200" cy="240" rx="26" ry="20" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <!-- Distal carpal row (trapezium, trapezoid, capitate, hamate) -->
    <ellipse cx="80" cy="180" rx="22" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="125" cy="170" rx="20" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="170" cy="170" rx="22" ry="20" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="215" cy="180" rx="22" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <!-- Three Gilula arcs (smooth curves) -->
    <path d="M50 250 Q140 200 230 248" stroke="#FFD100" stroke-width="2.5" fill="none"/>
    <path d="M50 230 Q140 180 230 228" stroke="#FFD100" stroke-width="2.5" fill="none"/>
    <path d="M55 195 Q140 165 215 195" stroke="#FFD100" stroke-width="2.5" fill="none"/>
    <text x="160" y="370" text-anchor="middle" font-size="11" fill="#7A6400" font-weight="700">3 smooth arcs</text>
  </g>
  <g transform="translate(440,130)" font-family="Inter, sans-serif">
    <text x="160" y="0" text-anchor="middle" font-weight="700" fill="#9F1239">Perilunate dislocation</text>
    <!-- Distal radius/ulna -->
    <path d="M40 360 L40 300 L120 280 L200 300 L200 360 Z" stroke="#0F172A" stroke-width="2.5" fill="#FFFFFF"/>
    <path d="M210 350 L260 350 L260 280 L210 290" stroke="#0F172A" stroke-width="2.5" fill="#FFFFFF"/>
    <!-- Proximal carpal row -->
    <ellipse cx="80" cy="240" rx="32" ry="22" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="140" cy="220" rx="28" ry="22" stroke="#9F1239" stroke-width="2.5" fill="#FFFFFF"/>
    <ellipse cx="200" cy="240" rx="26" ry="20" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <!-- Distal carpal row shifted dorsally -->
    <ellipse cx="80" cy="190" rx="22" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="125" cy="180" rx="20" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="170" cy="180" rx="22" ry="20" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <ellipse cx="215" cy="195" rx="22" ry="18" stroke="#0F172A" stroke-width="2" fill="#FFFFFF"/>
    <!-- Disrupted arcs -->
    <path d="M50 250 Q140 220 230 248" stroke="#9F1239" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
    <path d="M50 230 Q140 230 230 228" stroke="#9F1239" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
    <path d="M55 205 Q140 200 215 205" stroke="#9F1239" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
    <text x="160" y="370" text-anchor="middle" font-size="11" fill="#9F1239" font-weight="700">Arcs disrupted → urgent reduction</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="13" fill="#475569">
    <rect x="80" y="470" width="640" height="100" rx="16" fill="#FFFFFF" stroke="#FECACA"/>
    <text x="400" y="500" text-anchor="middle" font-weight="700" fill="#9F1239" font-size="13" letter-spacing="2">DO NOT MISS</text>
    <text x="400" y="528" text-anchor="middle" font-family="'Source Serif 4', serif" font-size="17" fill="#0F172A">FOOSH + median paresthesias + disrupted Gilula arcs = perilunate dislocation.</text>
    <text x="400" y="552" text-anchor="middle" font-size="12" fill="#64748B">Original UCLA Sports Medicine illustrative diagram — not a real radiograph</text>
  </g>
</svg>
